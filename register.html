<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — IlmCore AI</title>
<link rel="icon" href="assets/logo.png" type="image/png" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/login.css" />
<link rel="stylesheet" href="css/register.css" />
</head>
<body>

<a href="index.html" data-nav class="back-home">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
  Back to home
</a>

<div class="auth-side-orb orb-1"></div>
<div class="auth-side-orb orb-2"></div>

<div class="auth-wrap">
  <div class="auth-card register-card glass glass-reflection">
    <div class="auth-brand">
      <img src="assets/logo.png" alt="IlmCore AI" />
      <span>IlmCore AI</span>
    </div>
    <h1>Create your account</h1>
    <p class="auth-sub">Join IlmCore AI and start thinking faster</p>

    <form id="register-form" novalidate>
      <div class="field" id="field-name">
        <label for="name">Full name</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="name" name="name" placeholder="Your full name" autocomplete="name" required />
        </div>
        <div class="field-error">Please enter your name.</div>
      </div>

      <div class="field" id="field-email">
        <label for="email">Email address</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field-error">Please enter a valid email address.</div>
      </div>

      <div class="field" id="field-password">
        <label for="password">Password</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password" required />
          <button type="button" class="field-toggle" data-toggle-for="password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength" id="password-strength"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="field-error">Password must be at least 8 characters.</div>
      </div>

      <div class="field" id="field-confirm">
        <label for="confirm">Confirm password</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
          <input type="password" id="confirm" name="confirm" placeholder="Re-enter your password" autocomplete="new-password" required />
          <button type="button" class="field-toggle" data-toggle-for="confirm" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-error">Passwords do not match.</div>
      </div>

      <label class="terms-row">
        <input type="checkbox" id="terms" required />
        <span>I agree to IlmCore AI's Terms of Service and Privacy Policy</span>
      </label>

      <button type="submit" class="btn btn-primary btn-block" id="register-submit">
        <span id="register-submit-text">Create account</span>
      </button>
    </form>

    <div class="divider-text">or sign up with</div>

    <button type="button" class="btn-google" id="google-signin-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Continue with Google
    </button>

    <p class="auth-footer-link">Already have an account? <a href="login.html" data-nav>Log in</a></p>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
