<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — IlmCore AI</title>
<link rel="icon" href="assets/logo.png" type="image/png" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/login.css" />
</head>
<body>

<a href="index.html" data-nav class="back-home">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
  Back to home
</a>

<div class="auth-side-orb orb-1"></div>
<div class="auth-side-orb orb-2"></div>

<div class="auth-wrap">
  <div class="auth-card glass glass-reflection">
    <div class="auth-brand">
      <img src="assets/logo.png" alt="IlmCore AI" />
      <span>IlmCore AI</span>
    </div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Log in to continue your conversation</p>

    <form id="login-form" novalidate>
      <div class="field" id="field-email">
        <label for="email">Email address</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field-error">Please enter a valid email address.</div>
      </div>

      <div class="field" id="field-password">
        <label for="password">Password</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" class="field-toggle" id="toggle-password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-error">Enter your password to continue.</div>
      </div>

      <div class="auth-options-row">
        <label class="remember-me">
          <input type="checkbox" id="remember-me" />
          Remember me
        </label>
        <a href="#" class="forgot-link" id="forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="login-submit">
        <span id="login-submit-text">Log in</span>
      </button>
    </form>

    <div class="divider-text">or continue with</div>

    <div id="google-btn-container" style="display:flex; justify-content:center;">
      <button type="button" class="btn-google" id="google-signin-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>
    </div>

    <p class="auth-footer-link">Don't have an account? <a href="register.html" data-nav>Sign up free</a></p>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
